name: tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest qdrant-client fastembed agno openai

      - name: Run pytest
        env:
          PYTHONPATH: src:.
        run: |
          pytest -q tests/rag_ingest/test_embedding_provider.py \
            tests/rag_ingest/test_http_embedding_adapter.py \
            tests/rag_ingest/test_http_reranker.py \
            tests/rag_ingest/test_rerank.py \
            tests/rag_ingest/test_agno_backend_factory.py \
            tests/rag_ingest/test_query_encoders.py \
            tests/rag_ingest/test_document_encoders.py \
            tests/rag_ingest/test_qdrant_retriever_backend.py
